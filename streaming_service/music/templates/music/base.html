<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>{% block title %}Стриминг{% endblock %}</title>
<style>
  body { font-family: Arial; max-width: 900px; margin: 0 auto; padding: 20px; }
  nav { background: #333; padding: 10px; margin-bottom: 20px; }
  nav a { color: white; margin-right: 15px; text-decoration: none; }
  .msg { padding: 10px; margin: 10px 0; }
  .msg.error { background: #fdd; }
  .msg.success { background: #dfd; }
  form { margin: 15px 0; }
  label { display: block; margin-top: 8px; }
  input, select, textarea { padding: 5px; margin-top: 3px; }
  button { padding: 8px 15px; background: #007bff; color: white; border: none; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
</style>
</head>
<body>
<nav>
  <a href="{% url 'artist_list' %}">Исполнители</a>
  <a href="{% url 'album_list' %}">Альбомы</a>
  {% if user.is_authenticated %}
    <a href="{% url 'playlist_list' %}">Мои плейлисты</a>
    <a href="{% url 'artist_create' %}">+ Исполнитель</a>
    <a href="{% url 'playlist_create' %}">+ Плейлист</a>
    <span style="color:#ccc;">| {{ user.username }}</span>
    <a href="{% url 'logout' %}">Выход</a>
  {% else %}
    <a href="{% url 'login' %}">Вход</a>
    <a href="{% url 'register' %}">Регистрация</a>
  {% endif %}
</nav>

{% for m in messages %}
  <div class="msg {{ m.tags }}">{{ m }}</div>
{% endfor %}

{% block content %}{% endblock %}
</body>
</html>
