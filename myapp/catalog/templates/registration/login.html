{% extends 'catalog/base.html' %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0"><i class="fas fa-sign-in-alt"></i> Вход</h3>
            </div>
            <div class="card-body">
                {% if form.errors %}
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle"></i> Неверное имя пользователя или пароль.
                    </div>
                {% endif %}
                
                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label">
                            <i class="fas fa-user"></i> Имя пользователя
                        </label>
                        <input type="text" name="{{ form.username.name }}" class="form-control" 
                               id="{{ form.username.id_for_label }}" required autofocus>
                    </div>
                    
                    <div class="mb-3">
                        <label for="{{ form.password.id_for_label }}" class="form-label">
                            <i class="fas fa-key"></i> Пароль
                        </label>
                        <input type="password" name="{{ form.password.name }}" class="form-control" 
                               id="{{ form.password.id_for_label }}" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt"></i> Войти
                    </button>
                    
                    <input type="hidden" name="next" value="{{ next }}">
                </form>
                
                <hr>
                <div class="text-center">
                    <p>Нет аккаунта? <a href="{% url 'catalog:register' %}">Зарегистрируйтесь</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
